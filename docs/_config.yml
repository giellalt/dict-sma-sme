remote_theme: giellalt/jekyll-theme-giellalt@main
title: Dictionary for South Sámi ⇒ North Sámi
description: An electronic dictionary from South Sámi to North Sámi
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

defaults:
  - scope: { path: "" }
    values:
      layout: minimal
